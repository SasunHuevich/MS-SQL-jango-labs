{% extends "base.html" %}

{% block title %}{% if object %}Редактировать{% else %}Новый{% endif %} комментарий{% endblock %}

{% block content %}
<h1>{% if object %}Редактировать комментарий{% else %}Новый комментарий{% endif %}</h1>
<div class="card">
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn">Сохранить</button>
        <a href="{% url 'comment_list' %}" class="btn btn-secondary">Отмена</a>
    </form>
</div>
{% endblock %}
