<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход</title>
    <style>
        body {
            font-family: system-ui, sans-serif;
            background: #f4f4f5;
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .card {
            background: #fff;
            padding: 2rem;
            border-radius: 8px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 1px 3px rgba(0,0,0,.1);
        }
        h1 { margin-top: 0; }
        label { display: block; margin-bottom: 0.25rem; font-weight: 500; }
        input {
            width: 100%;
            padding: 0.5rem;
            margin-bottom: 1rem;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            padding: 0.6rem;
            background: #2563eb;
            color: #fff;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 1rem;
        }
        .error { background: #fee2e2; color: #991b1b; padding: 0.75rem; border-radius: 6px; margin-bottom: 1rem; list-style: none; }
        .success { background: #dcfce7; color: #166534; padding: 0.75rem; border-radius: 6px; margin-bottom: 1rem; list-style: none; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Вход</h1>
        {% if messages %}
        <ul>
            {% for message in messages %}
            <li class="{{ message.tags }}">{{ message }}</li>
            {% endfor %}
        </ul>
        {% endif %}
        <form method="post" action="{% url 'login' %}">
            {% csrf_token %}
            {% if next %}<input type="hidden" name="next" value="{{ next }}">{% endif %}
            <label for="username">Логин</label>
            <input type="text" name="username" id="username" required autofocus autocomplete="username">
            <label for="password">Пароль</label>
            <input type="password" name="password" id="password" required autocomplete="current-password">
            <button type="submit">Войти</button>
        </form>
        <p style="margin-top: 1rem; text-align: center;">
            <a href="{% url 'register' %}" style="color: #2563eb;">Регистрация</a>
        </p>
    </div>
</body>
</html>
