{% extends "base.html" %}

{% block title %}Удаление{% endblock %}

{% block content %}
<div class="card">
    <h1>Удалить {{ object_label }}?</h1>
    <p>{{ object }}</p>
    <form method="post">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger">Удалить</button>
        <a href="javascript:history.back()" class="btn btn-secondary">Отмена</a>
    </form>
</div>
{% endblock %}
